# Lembrete diário: contas vencendo hoje (notificações push)
# Configurar em: Settings > Secrets and variables > Actions
# - API_BASE_URL: URL do app em produção (ex: https://finanx.vercel.app)
# - CRON_SECRET: mesmo valor da variável CRON_SECRET no Vercel/ambiente

name: Daily due reminder

on:
  schedule:
    - cron: '0 11 * * *'   # 11h UTC (8h BRT)
  workflow_dispatch:       # permite rodar manualmente

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.API_BASE_URL }}" ]; then
            echo "::error::Configure o secret API_BASE_URL em Settings > Secrets > Actions (ex: https://seu-app.vercel.app)"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::Configure o secret CRON_SECRET em Settings > Secrets > Actions"
            exit 1
          fi
      - name: Call daily-due API
        run: |
          OUTPUT=$(curl -sS -w "\n%{http_code}" -X GET "${{ secrets.API_BASE_URL }}/api/cron/daily-due" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          HTTP_CODE=$(echo "$OUTPUT" | tail -n1)
          BODY=$(echo "$OUTPUT" | sed '$d')
          echo "Response: $BODY"
          echo "HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "OK ($HTTP_CODE)"
            exit 0
          else
            echo "Failed with HTTP $HTTP_CODE"
            exit 1
          fi
